<ion-header>
  <ion-toolbar>
    <ion-title> ToDo App</ion-title>
  </ion-toolbar>
</ion-header>



<ion-content class="ion-padding">

  <ion-item>
    <ion-input 
      placeholder="Nueva Tarea..." 
      [(ngModel)] = "newTaskTitle">
    </ion-input>
    <ion-button (click)="addTask()">Agregar</ion-button>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let task of tasks" (click)="toggleTask(task.id)">
      <ion-label [class.completed]="task.completed">        
          {{ task.title }}        
      </ion-label>

      <ion-toggle 
        slot="end"
        [checked]="task.completed"
        (ionChange)="toggleTask(task.id)">
      </ion-toggle>

    </ion-item>
  </ion-list>
</ion-content>
