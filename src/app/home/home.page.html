<ion-header>
  <ion-toolbar>
    <ion-title> ToDo App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let task of tasks">
      <ion-label>
        <h2 [style.text-decoration]="task.completed ? 'line-through': 'none'">
          {{ task.title }}
        </h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
