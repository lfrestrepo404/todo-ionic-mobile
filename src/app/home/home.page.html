<ion-header>
  <ion-toolbar class="custom-toolbar">

    <div class="header-container">

      <div class="header-left">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <span class="header-title">My Tasks</span>
      </div>

      <ion-button fill="clear" class="header-menu" (click)="openCategoriesModal()">
        <ion-icon name="ellipsis-vertical"></ion-icon>
      </ion-button>

    </div>

  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding">

  <div class="filter-section">

  </div>

  <div class="section-title">

  <ion-list lines="none">

    <ion-item *ngFor="let task of tasks" class="task-item">

      <div class="task-content" [class.completed]="task.completed">
        <div class="task-info">
          <div class="task-title" [class.completed]="task.completed">
            {{ task.title }}
          </div>
          <ion-badge mode="ios" *ngIf="task.categoryId" class="category-badge">
            {{ getCategoryName(task.categoryId) }}
          </ion-badge>
        </div>


        <div class="task-actions">
          <ion-button fill="clear" class="btn-action check-btn" (click)="toggleTask(task.id)">
            <ion-icon slot="icon-only" [name]="task.completed ? 'checkmark-circle' : 'radio-button-off-outline'">
            </ion-icon>
          </ion-button>

          <ion-button fill="clear" class="btn-action delete-btn" (click)="deleteTask(task.id)">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
        </div>
      </div>

    </ion-item>

  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="custom-fab" (click)="openNewTaskModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>


</ion-content>
